name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-upload:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags "-X main.version=v${VERSION}" -o "treehouse${ext}" .

      - name: Archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          name="treehouse-v${VERSION}-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            zip "${name}.zip" treehouse.exe
          else
            tar czf "${name}.tar.gz" treehouse
          fi

      - name: Upload archive
        env:
          GH_TOKEN: ${{ github.token }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          name="treehouse-v${VERSION}-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            gh release upload "${TAG_NAME}" "${name}.zip"
          else
            gh release upload "${TAG_NAME}" "${name}.tar.gz"
          fi

      - name: Upload archive as artifact
        uses: actions/upload-artifact@v4
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.release-please.outputs.version }}
        with:
          name: archive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: treehouse-v${{ needs.release-please.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}.*

  notify-issues:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Comment on resolved issues
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          # Get the previous tag
          prev_tag=$(gh api repos/${{ github.repository }}/releases \
            --jq "[.[] | select(.tag_name != \"${TAG_NAME}\")] | first | .tag_name")

          if [ -z "$prev_tag" ] || [ "$prev_tag" = "null" ]; then
            echo "No previous release found, skipping"
            exit 0
          fi

          echo "Finding PRs between ${prev_tag} and ${TAG_NAME}"

          # Get commits between tags via compare API (excludes base tag, no inclusive-boundary issue)
          # Note: limited to 250 commits, but we only need PR numbers which are deduped anyway
          commits=$(gh api repos/${{ github.repository }}/compare/${prev_tag}...${TAG_NAME} \
            --jq '.commits[].sha')

          # Collect unique PR numbers across all commits (avoids duplicate timeline queries)
          declare -A seen_prs
          for sha in $commits; do
            prs=$(gh api repos/${{ github.repository }}/commits/${sha}/pulls \
              --jq '.[].number' 2>/dev/null || true)
            for pr in $prs; do
              seen_prs[$pr]=1
            done
          done

          # For each unique PR, find linked issues via PR body and comment
          declare -A seen_issues
          for pr in "${!seen_prs[@]}"; do
            # Check the PR body for "Fixes #N" / "Closes #N" patterns (same-repo only, excludes org/repo#N)
            issues=$(gh api repos/${{ github.repository }}/pulls/${pr} \
              --jq '.body' 2>/dev/null \
              | grep -oiE '(fix(es|ed)?|close[sd]?|resolve[sd]?)\s+#[0-9]+' \
              | grep -oE '[0-9]+' || true)

            for issue in $issues; do
              if [ -z "${seen_issues[$issue]+x}" ]; then
                seen_issues[$issue]=1
                echo "Commenting on issue #${issue}"
                gh issue comment "$issue" \
                  --repo ${{ github.repository }} \
                  --body "This issue has been addressed in [v${VERSION}](https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}). :tada:"
              fi
            done
          done

  checksums:
    needs: [release-please, build-and-upload]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          pattern: archive-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum treehouse-v* > checksums.txt

      - name: Upload checksums
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "${TAG_NAME}" checksums.txt
        working-directory: ${{ github.workspace }}
