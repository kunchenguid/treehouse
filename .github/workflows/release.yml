name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: go

  build-and-upload:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags "-X main.version=v${VERSION}" -o "treehouse${ext}" .

      - name: Archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          name="treehouse-v${VERSION}-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            zip "${name}.zip" treehouse.exe
          else
            tar czf "${name}.tar.gz" treehouse
          fi

      - name: Upload archive
        env:
          GH_TOKEN: ${{ github.token }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          name="treehouse-v${VERSION}-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            gh release upload "${TAG_NAME}" "${name}.zip"
          else
            gh release upload "${TAG_NAME}" "${name}.tar.gz"
          fi

      - name: Upload archive as artifact
        uses: actions/upload-artifact@v4
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.release-please.outputs.version }}
        with:
          name: archive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: treehouse-v${{ needs.release-please.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}.*

  notify-issues:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Comment on resolved issues
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          # Get the previous release and its published date
          prev_release=$(gh api repos/${{ github.repository }}/releases \
            --jq "[.[] | select(.tag_name != \"${TAG_NAME}\")] | first")
          prev_tag=$(echo "$prev_release" | jq -r '.tag_name')
          prev_date=$(echo "$prev_release" | jq -r '.published_at')

          if [ -z "$prev_tag" ] || [ "$prev_tag" = "null" ]; then
            echo "No previous release found, skipping"
            exit 0
          fi

          echo "Finding PRs between ${prev_tag} and ${TAG_NAME}"

          # Get commits via commits API (supports real pagination, no 250-commit cap)
          commits=$(gh api repos/${{ github.repository }}/commits \
            --paginate -f sha="${TAG_NAME}" -f since="${prev_date}" \
            --jq '.[].sha')

          # Collect unique issue numbers from closing references in PRs
          declare -A seen_issues
          for sha in $commits; do
            # Find PRs associated with this commit
            prs=$(gh api repos/${{ github.repository }}/commits/${sha}/pulls \
              --jq '.[].number' 2>/dev/null || true)
            for pr in $prs; do
              # Get issues linked via cross-references
              xref_issues=$(gh api repos/${{ github.repository }}/issues/${pr}/timeline \
                --paginate --jq '.[] | select(.event == "cross-referenced") | .source.issue.number // empty' 2>/dev/null || true)

              # Get issues linked via sidebar (connected events use .url, not .source)
              connected_issues=$(gh api repos/${{ github.repository }}/issues/${pr}/timeline \
                --paginate --jq '.[] | select(.event == "connected") | .url' 2>/dev/null \
                | grep -oE '/issues/[0-9]+' | grep -oE '[0-9]+' || true)

              # Also check the PR body for "Fixes #N" / "Closes #N" patterns
              body_issues=$(gh api repos/${{ github.repository }}/pulls/${pr} \
                --jq '.body' 2>/dev/null | grep -oiE '(fix(es|ed)?|close[sd]?|resolve[sd]?)\s+#[0-9]+' | grep -oE '[0-9]+' || true)

              for issue in $xref_issues $connected_issues $body_issues; do
                if [ -z "${seen_issues[$issue]+x}" ]; then
                  seen_issues[$issue]=1
                  echo "Commenting on issue #${issue}"
                  gh issue comment "$issue" \
                    --repo ${{ github.repository }} \
                    --body "This issue has been addressed in [v${VERSION}](https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}). :tada:"
                fi
              done
            done
          done

  checksums:
    needs: [release-please, build-and-upload]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          pattern: archive-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum treehouse-v* > checksums.txt

      - name: Upload checksums
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "${TAG_NAME}" checksums.txt
        working-directory: ${{ github.workspace }}
